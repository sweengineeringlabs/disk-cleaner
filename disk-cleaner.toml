# disk-cleaner.toml - Multi-language project cleaning configuration
# Single-line values only (no multi-line arrays or strings)
#
# Profile fields:
#   name              Display name for the profile
#   marker            Primary file used to detect projects (e.g. Cargo.lock, pom.xml)
#   alt_markers       Additional marker files to detect projects
#   type              "command" (run a shell command) or "remove" (delete directories)
#
# Command-type profiles:
#   command           Shell command to run (e.g. "cargo clean", "mvn clean")
#   wrapper           Wrapper script to prefer over command (e.g. ./mvnw)
#   wrapper_windows   Windows-specific wrapper (e.g. .\mvnw.cmd)
#   clean_dir         Build output directory to measure before cleaning (for size tracking)
#   output_pattern    Regex to parse command output for file count
#
# Remove-type profiles:
#   targets           Directories to delete (e.g. node_modules, .venv)
#   optional_targets  Directories to delete only if they exist (e.g. .next, dist)
#   recursive_targets Directories to find and delete recursively (e.g. __pycache__)

[settings]
default_path = ""
default_profiles = ["rust"]

[profiles.rust]
name = "Rust (Cargo)"
marker = "Cargo.lock"
type = "command"
command = "cargo clean"
clean_dir = "target"
output_pattern = 'Removed (\d+) files'

[profiles.node]
name = "Node.js"
marker = "package-lock.json"
alt_markers = ["yarn.lock", "pnpm-lock.yaml", "bun.lock"]
type = "remove"
targets = ["node_modules"]
optional_targets = [".next", ".nuxt", "dist"]

[profiles.java-maven]
name = "Java (Maven)"
marker = "pom.xml"
type = "command"
command = "mvn clean"
wrapper = "./mvnw"
wrapper_windows = ".\\mvnw.cmd"
clean_dir = "target"

[profiles.java-gradle]
name = "Java (Gradle)"
marker = "build.gradle"
alt_markers = ["build.gradle.kts"]
type = "command"
command = "gradle clean"
wrapper = "./gradlew"
wrapper_windows = ".\\gradlew.bat"
clean_dir = "build"

[profiles.python]
name = "Python"
marker = "pyproject.toml"
alt_markers = ["setup.py", "requirements.txt"]
type = "remove"
targets = [".venv", "venv", ".mypy_cache", ".pytest_cache", ".ruff_cache", "dist", "build"]
recursive_targets = ["__pycache__"]
